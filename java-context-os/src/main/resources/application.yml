context-os:
  llm:
    provider: deepseek
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      model: deepseek-chat
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-20250514
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
  embedding:
    mode: auto          # auto | local | api | ollama | disable
    local:
      model: bge-small.onnx
      model-path: ./models/bge-small.onnx
    api:
      endpoint: http://embedding-service:8080
      api-key: ""
      model: text-embedding-3-small
    ollama:
      endpoint: http://localhost:11434
      model: nomic-embed-text
  memory:
    db-path: ./data/context_os.db
    max-tokens: 128000
  trace:
    enabled: true
    storage-dir: ./data/traces

spring:
  main:
    banner-mode: off

logging:
  level:
    com.owencli.contextos: INFO
