context-os:
  llm:
    provider: deepseek
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      model: deepseek-chat
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-20250514
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o
  memory:
    db-path: ./data/context_os.db
    max-tokens: 128000
  trace:
    enabled: true
    storage-dir: ./data/traces

spring:
  main:
    banner-mode: off

logging:
  level:
    com.owencli.contextos: INFO
